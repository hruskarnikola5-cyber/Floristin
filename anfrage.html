<section class="container" style="padding:50px 0">
    <div class="bento-item col-8" style="margin:0 auto">
        <h2 class="serif">Ihre blühende Anfrage</h2>
        <form style="display:flex; flex-direction:column; gap:20px; margin-top:30px">
            <input type="text" placeholder="Ihr Name" style="padding:15px; border-radius:10px; border:1px solid #ddd">
            <input type="email" placeholder="E-Mail Adresse" style="padding:15px; border-radius:10px; border:1px solid #ddd">
            <select style="padding:15px; border-radius:10px; border:1px solid #ddd">
                <option>Anlass wählen...</option>
                <option>Hochzeit</option>
                <option>Workshop</option>
                <option>Abo-Anfrage</option>
            </select>
            <textarea placeholder="Ihre Wünsche" rows="5" style="padding:15px; border-radius:10px; border:1px solid #ddd"></textarea>
            <button type="submit" class="btn btn-primary">Anfrage absenden</button>
        </form>
    </div>
</section>
